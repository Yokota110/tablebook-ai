services:
  postgres:
    image: postgres:16-alpine
    container_name: tablebook-postgres
    restart: unless-stopped
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tablebook
    volumes:
      - tablebook_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tablebook"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  tablebook_postgres_data:
